spring:
  application:
    name: auth-service
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: com.fasterxml.jackson.databind.util.StdDateFormat
  config:
    import: optional:configserver:http://config-server:8888
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB