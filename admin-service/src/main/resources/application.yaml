spring:
  application:
    name: ADMIN-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/admin_db
    username: root
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8084
